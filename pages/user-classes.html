
      <div class="page-header">
        <div>
          <div class="page-title">Class Timetable</div>
          <div class="page-subtitle">Timetable for your teaching classes</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div style="position:relative;display:inline-block">
            <button class="btn btn-pdf btn-sm page-action-btn" onclick="openDownloadMenu('user-classes-dm', this)">Download PDF</button>
            <div id="user-classes-dm" class="download-menu">
              <div class="dm-scale-row">
                <span class="dm-scale-label">Page Scale</span>
                <div class="dm-scale-btns">
                  <button type="button" class="dm-scale-btn" data-scale="70" onclick="setMenuScale(event,this)">70%</button>
                  <button type="button" class="dm-scale-btn" data-scale="80" onclick="setMenuScale(event,this)">80%</button>
                  <button type="button" class="dm-scale-btn dm-scale-active" data-scale="90" onclick="setMenuScale(event,this)">90%</button>
                  <button type="button" class="dm-scale-btn" data-scale="100" onclick="setMenuScale(event,this)">100%</button>
                </div>
              </div>
              <div class="download-divider"></div>
              <div class="download-opt" onclick="downloadUserClassesDoc('pdf','A4','portrait',getMenuScale(this.closest('.download-menu')))">PDF — A4 Portrait</div>
              <div class="download-opt" onclick="downloadUserClassesDoc('pdf','A4','landscape',getMenuScale(this.closest('.download-menu')))">PDF — A4 Landscape</div>
              <div class="download-divider"></div>
            </div>
          </div>
          <button class="btn btn-excel btn-sm page-action-btn" onclick="downloadGenericExcel('user-classes-body',['Class','Subject','Teacher(s)','Days','Time'],'Class Timetable','IDL_Class_Timetable')">Download Excel</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <select id="user-classes-filter" onchange="renderUserClassTimetable()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:inherit;flex:1;min-width:160px">
            <option value="">All My Classes</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span style="font-size:0.88rem;color:var(--text-muted);font-weight:600">Days:</span>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Monday" class="user-classes-day-cb" onchange="renderUserClassTimetable()" checked style="accent-color:var(--accent)"> Mon</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Tuesday" class="user-classes-day-cb" onchange="renderUserClassTimetable()" checked style="accent-color:var(--accent)"> Tue</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Wednesday" class="user-classes-day-cb" onchange="renderUserClassTimetable()" checked style="accent-color:var(--accent)"> Wed</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Thursday" class="user-classes-day-cb" onchange="renderUserClassTimetable()" checked style="accent-color:var(--accent)"> Thu</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Friday" class="user-classes-day-cb" onchange="renderUserClassTimetable()" checked style="accent-color:var(--accent)"> Fri</label>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px">
            <label style="font-size:0.82rem;color:var(--text-muted);white-space:nowrap">Show:</label>
            <select id="user-classes-per-page" onchange="renderUserClassTimetable()" style="padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.85rem">
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="0">All</option>
            </select>
            <span style="font-size:0.82rem;color:var(--text-muted)">records</span>
          </div>
          <span id="user-classes-count-label" style="font-size:0.82rem;color:var(--text-muted)"></span>
        </div>
      </div>
      <div class="card">
        <div class="table-wrap"><table>
          <thead><tr><th>Class</th><th>Subject</th><th>Teacher(s)</th><th>Days</th><th>Time</th></tr></thead>
          <tbody id="user-classes-body"><tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr></tbody>
        </table></div>
      </div>
