
      <div class="page-header">
        <div>
          <div class="page-title">Class Subjects</div>
          <div class="page-subtitle">Manage subjects per class</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div style="position:relative;display:inline-block">
            <button class="btn btn-pdf btn-sm" onclick="openDownloadMenu('cs-dm', this)">&#128196; Download PDF</button>
            <div id="cs-dm" class="download-menu" style="display:none">
              <div class="download-opt download-scale-row">
                <span class="dscale-btn" onclick="setMenuScale('cs-dm',100,this)">100%</span>
                <span class="dscale-btn active" onclick="setMenuScale('cs-dm',90,this)">90%</span>
                <span class="dscale-btn" onclick="setMenuScale('cs-dm',80,this)">80%</span>
                <span class="dscale-btn" onclick="setMenuScale('cs-dm',70,this)">70%</span>
              </div>
              <div class="download-opt" onclick="downloadTableDoc('cs-body','class_subjects',['#','Subject Name'],'pdf','A4','portrait',getMenuScale('cs-dm'))">&#128196; PDF &mdash; A4 Portrait</div>
              <div class="download-opt" onclick="downloadTableDoc('cs-body','class_subjects',['#','Subject Name'],'pdf','A4','landscape',getMenuScale('cs-dm'))">&#128196; PDF &mdash; A4 Landscape</div>
            </div>
          </div>
          <button class="btn btn-excel btn-sm" onclick="downloadGenericExcel('cs-body',['#','Subject Name'],'Class Subjects','IDL_Class_Subjects')">&#128202; Download Excel</button>
          <button class="btn btn-primary" onclick="openAddSubjectModal()" style="gap:6px">+ Add Subject</button>
        </div>
      </div>

      <!-- Class selector -->
      <div class="card" style="padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <label style="font-size:0.88rem;font-weight:600;color:var(--text-muted);white-space:nowrap">Select Class:</label>
        <div style="position:relative;flex:1;max-width:300px">
          <div id="cs-class-trigger" onclick="openCSClassPicker()" class="ce-trigger"
            style="padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;user-select:none;min-width:200px">
            <span id="cs-class-label" style="font-size:0.88rem;color:var(--text-muted)">— Choose a class —</span>
            <span style="font-size:0.7rem;color:var(--text-muted)">&#9660;</span>
          </div>
        </div>
        <span id="cs-class-name-badge" style="display:none;background:rgba(42,74,142,0.15);color:var(--accent);padding:3px 12px;border-radius:6px;font-size:0.85rem;font-weight:700"></span>
      </div>

      <!-- Search bar (shown after class selected) -->
      <div id="cs-search-wrap" style="display:none">
        <div class="page-search-wrap">
          <span class="search-icon">&#128269;</span>
          <input type="text" id="cs-search" oninput="renderClassSubjects()" placeholder="Search subjects…">
        </div>
      </div>

      <div id="cs-subjects-area">
        <div class="card" style="text-align:center;padding:40px;color:var(--text-muted)">Select a class above to view its subjects.</div>
      </div>
    

<div class="modal-overlay" id="subject-modal-overlay" onclick="if(event.target===this)closeModal('subject-modal-overlay')">
      <div class="modal" style="max-width:460px">
        <div class="modal-header">
          <h3 id="subject-modal-title">Add Subject</h3>
          <button class="modal-close" onclick="closeModal('subject-modal-overlay')">&#10005;</button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:14px">

          <!-- Class multi-select (add mode) -->
          <div class="form-group" style="margin:0" id="subject-modal-class-group">
            <label style="font-size:0.85rem;font-weight:600">Select Class(es) <span style="color:var(--danger)">*</span></label>
            <div style="margin-top:6px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface)">
              <input type="text" id="subject-modal-class-search" placeholder="Search class…"
                oninput="filterSMClassList(this.value)"
                onclick="document.getElementById('subject-modal-class-list').style.display=''"
                onfocus="document.getElementById('subject-modal-class-list').style.display=''"
                style="width:100%;padding:8px 12px;border:none;border-bottom:1px solid var(--border);background:var(--surface2);outline:none;font-size:0.88rem;color:var(--text);box-sizing:border-box">
              <div id="subject-modal-class-list" style="max-height:160px;overflow-y:auto;display:none"></div>
            </div>
            <div id="subject-modal-class-tags" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:5px"></div>
          </div>

          <!-- Class read-only (edit mode) -->
          <div class="form-group" style="margin:0;display:none" id="subject-modal-class-readonly">
            <label style="font-size:0.85rem;font-weight:600">Class</label>
            <div id="subject-modal-class-display" style="padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--accent);font-weight:600;font-size:0.88rem;margin-top:4px"></div>
          </div>

          <div class="form-group" style="margin:0">
            <label style="font-size:0.85rem;font-weight:600">Subject Name <span style="color:var(--danger)">*</span></label>
            <input type="text" id="subject-modal-name" placeholder="e.g. Mathematics, Science…" style="margin-top:4px">
          </div>
          <div id="subject-modal-error" style="display:none;color:var(--danger);font-size:0.85rem;background:rgba(231,76,60,.1);padding:8px 12px;border-radius:6px"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('subject-modal-overlay')">Cancel</button>
          <button class="btn btn-primary" onclick="saveSubject()">Save</button>
        </div>
      </div>
    </div>
