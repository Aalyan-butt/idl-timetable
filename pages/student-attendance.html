<style>
/* Student Attendance Mark page — reuses att-* classes from staff-attendance.html */
/* Pills as clickable filter buttons */
.att-pill {
  cursor: pointer;
  background: none;
  transition: opacity .15s, transform .1s, box-shadow .15s;
}
.att-pill:hover { opacity: .85; transform: translateY(-1px); }
.att-pill.pill-active { box-shadow: 0 0 0 2px currentColor; }

.sa-class-select {
  background:#1c1c2c; border:1px solid rgba(201,168,76,0.3); border-radius:8px;
  color:#f0ead0; padding:6px 12px; font-size:0.88rem; outline:none; min-width:200px;
}
.sa-class-select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(201,168,76,0.12); }
.statt-enroll-info { font-size:0.78rem; color:var(--text-muted); margin-bottom:14px; padding:0 2px; }
</style>

<div class="page-header">
  <div>
    <div class="page-title">Student Attendance</div>
    <div class="page-subtitle">Mark daily attendance for students by class</div>
  </div>
</div>

<!-- Top bar: class + date + summary pills -->
<div class="att-top-bar" id="statt-top-bar">
  <div class="att-date-group">
    <span class="att-date-label">Class</span>
    <select id="statt-class" class="sa-class-select" onchange="stattLoad()">
      <option value="">All Classes</option>
    </select>
  </div>
  <div class="att-date-group">
    <span class="att-date-label">Date</span>
    <input type="date" id="statt-date" class="att-date-input" onchange="stattLoad()">
  </div>
  <div class="att-summary-pills" id="statt-pills" style="margin-left:auto">
    <button class="att-pill att-pill-unmarked" id="statt-pill-unmarked" onclick="stattFilterByStatus('unmarked')" title="Click to filter unmarked students">0 Unmarked</button>
    <button class="att-pill att-pill-present"  id="statt-pill-present"  onclick="stattFilterByStatus('present')"  title="Click to filter present students">0 Present</button>
    <button class="att-pill att-pill-absent"   id="statt-pill-absent"   onclick="stattFilterByStatus('absent')"   title="Click to filter absent students">0 Absent</button>
    <button class="att-pill att-pill-late"     id="statt-pill-late"     onclick="stattFilterByStatus('late')"     title="Click to filter late students">0 Late</button>
    <button class="att-pill att-pill-leave"    id="statt-pill-leave"    onclick="stattFilterByStatus('leave')"    title="Click to filter students on leave">0 Leave</button>
  </div>
</div>
<div class="statt-enroll-info" id="statt-enroll-info"></div>

<!-- Bulk actions -->
<div class="att-bulk-row" id="statt-bulk" style="display:none">
  <span class="att-bulk-label">Mark All:</span>
  <button class="btn-action btn-ok"       onclick="stattMarkAll('present')">Present</button>
  <button class="btn-action btn-danger"   onclick="stattMarkAll('absent')">Absent</button>
  <button class="btn-action btn-edit"     onclick="stattMarkAll('late')">Late</button>
  <button class="btn-action btn-download" onclick="stattMarkAll('leave')">Leave</button>
  <span style="flex:1"></span>
  <span style="font-size:0.78rem;color:var(--text-muted)" id="statt-saved-note"></span>
</div>

<!-- Table -->
<div class="att-table-wrap" id="statt-table-wrap">
  <table class="att-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Student</th>
        <th id="statt-th-class" style="display:none">Class</th>
        <th>Status</th>
        <th>Remarks</th>
      </tr>
    </thead>
    <tbody id="statt-tbody">
      <tr><td colspan="4" style="text-align:center;padding:48px 20px;color:var(--text-muted)">Loading students…</td></tr>
    </tbody>
  </table>
</div>

<div class="att-save-bar" id="statt-save-bar" style="display:none">
  <span id="statt-progress" style="font-size:0.82rem;color:var(--text-muted)"></span>
  <button class="btn btn-primary" onclick="stattSave()">Save Attendance</button>
</div>
