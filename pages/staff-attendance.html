<style>
/* ── Staff Attendance — page-specific only ──────────────────── */
/* All shared att-* styles live in css/components.css */
.att-pill {
  cursor: pointer;
  background: none;
  transition: opacity .15s, transform .1s, box-shadow .15s;
}
.att-pill:hover { opacity: .85; transform: translateY(-1px); }
.att-pill.pill-active { box-shadow: 0 0 0 2px currentColor; }
</style>

<div class="page-header">
  <div>
    <div class="page-title">Staff Attendance</div>
    <div class="page-subtitle">Mark daily attendance for all staff members</div>
  </div>
</div>

<!-- Top bar: date picker + quick summary pills -->
<div class="att-top-bar" id="sa-top-bar">
  <div class="att-date-group">
    <span class="att-date-label">Date</span>
    <input type="date" id="sa-date" class="att-date-input" onchange="saLoadAttendance()">
  </div>
  <div class="att-summary-pills" id="sa-pills">
    <button class="att-pill att-pill-unmarked" id="sa-pill-unmarked" onclick="saFilterByStatus('unmarked')" title="Click to filter unmarked staff">0 Unmarked</button>
    <button class="att-pill att-pill-present"  id="sa-pill-present"  onclick="saFilterByStatus('present')"  title="Click to filter present staff">0 Present</button>
    <button class="att-pill att-pill-absent"   id="sa-pill-absent"   onclick="saFilterByStatus('absent')"   title="Click to filter absent staff">0 Absent</button>
    <button class="att-pill att-pill-late"     id="sa-pill-late"     onclick="saFilterByStatus('late')"     title="Click to filter late staff">0 Late</button>
    <button class="att-pill att-pill-leave"    id="sa-pill-leave"    onclick="saFilterByStatus('leave')"    title="Click to filter staff on leave">0 Leave</button>
  </div>
</div>

<!-- Bulk action row -->
<div class="att-bulk-row">
  <span class="att-bulk-label">Mark All:</span>
  <button class="btn-action btn-ok"   onclick="saMarkAll('present')">Present</button>
  <button class="btn-action btn-danger" onclick="saMarkAll('absent')">Absent</button>
  <button class="btn-action btn-edit"   onclick="saMarkAll('late')">Late</button>
  <button class="btn-action btn-download" onclick="saMarkAll('leave')">Leave</button>
  <span style="flex:1"></span>
  <span style="font-size:0.78rem;color:var(--text-muted)" id="sa-saved-note"></span>
</div>

<!-- Attendance table -->
<div class="att-table-wrap">
  <table class="att-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Staff Member</th>
        <th>Status</th>
        <th>Remarks</th>
      </tr>
    </thead>
    <tbody id="sa-tbody">
      <tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-muted)">Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="att-save-bar">
  <span id="sa-progress" style="font-size:0.82rem;color:var(--text-muted)"></span>
  <button class="btn btn-primary" onclick="saSaveAttendance()" id="sa-save-btn">Save Attendance</button>
</div>
