
      <div class="page-header">
        <div>

        </div>

                </div>

              <div class="download-divider"></div>
              <div class="download-opt" onclick="downloadTableDoc('pi-table-body','parent_information',['Family ID','Parent Name','NIC Number','Phone','Children'],'pdf','A4','portrait',getMenuScale(this.closest('.download-menu')))">PDF — A4 Portrait</div>
              <div class="download-opt" onclick="downloadTableDoc('pi-table-body','parent_information',['Family ID','Parent Name','NIC Number','Phone','Children'],'pdf','A4','landscape',getMenuScale(this.closest('.download-menu')))">PDF — A4 Landscape</div>
              <div class="download-divider"></div>
            </div>
          </div>
          <button class="btn btn-excel btn-sm" onclick="downloadGenericExcel('pi-table-body',['Family ID','Parent Name','NIC Number','Phone','Children'],'Parent Information','IDL_Parents')">Download Excel</button>
          <button class="btn btn-primary" onclick="openAddParentModal()" style="gap:6px">+ Add Parent</button>
        </div>
      </div>

      <!-- Search bar -->
      <div class="page-search-wrap" style="margin-bottom:14px">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="pi-search" oninput="renderParentTable()" placeholder="Search by name, NIC, family ID…">
      </div>

      <!-- Column Visibility Filter -->
      <div class="card" style="margin-bottom:10px;padding:10px 16px">
        <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none" onclick="toggleParentFilterPanel()">
          <span class="col-vis-title">&#9881; Column Visibility</span>
          <span id="pi-filter-caret" style="font-size:0.8rem;color:var(--text-muted);transition:transform .2s">&#9650;</span>
        </div>
        <div id="pi-col-filter-body" style="margin-top:12px">
          <div id="pi-col-checkboxes" style="display:flex;flex-wrap:wrap;gap:6px 14px"></div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button class="btn btn-secondary" style="font-size:0.78rem;padding:4px 12px" onclick="setAllParentCols(true)">Select All</button>
            <button class="btn btn-secondary" style="font-size:0.78rem;padding:4px 12px" onclick="setAllParentCols(false)">Deselect All</button>
          </div>
        </div>

      <!-- Table area -->
      <div id="pi-table-area">
        <div class="card" style="text-align:center;padding:40px;color:var(--text-muted)">Loading…</div>

<div class="modal-overlay" id="parent-modal-overlay" onclick="if(event.target===this)closeModal('parent-modal-overlay')">
      <div class="modal" style="max-width:680px;width:96vw;display:flex;flex-direction:column;max-height:92vh">

        <!-- Header -->
        <div class="modal-header" style="background:linear-gradient(135deg,var(--navy2) 0%,var(--navy) 100%);border-bottom:none;padding:11px 16px;flex-shrink:0">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <h3 id="parent-modal-title" style="color:#fff;margin:0;font-size:1rem;font-weight:600">Add Parent</h3>
          </div>
          <button class="modal-close" style="color:#fff;opacity:0.85" onclick="closeModal('parent-modal-overlay')">&#10005;</button>
        </div>

        <!-- Scrollable body -->
        <div class="modal-body" style="padding:0;overflow-y:auto;flex:1">

          <!-- ── Two-column section ── -->
          <div style="display:flex;align-items:stretch;min-height:280px">

            <!-- LEFT: Photo panel -->
            <div style="width:205px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface2);display:flex;flex-direction:column;align-items:center;padding:16px 10px 12px;gap:9px">

              <!-- Drop / preview area -->
              <div id="pm-photo-drop-area"
                   style="width:168px;height:168px;border:1px solid var(--border);background:var(--surface);cursor:pointer;position:relative;overflow:hidden"
                   onclick="document.getElementById('pm-photo-input').click()"
                   ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
                   ondragleave="this.style.borderColor='var(--border)'"
                   ondrop="handleParentPhotoDrop(event)">
                <div id="pm-photo-preview" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;box-sizing:border-box;padding:10px">
                  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;max-width:130px;pointer-events:none">
                    <svg width="68" height="68" viewBox="0 0 100 100" fill="none" stroke="var(--text-muted)" stroke-width="2.5">
                      <ellipse cx="50" cy="32" rx="20" ry="22"/><path d="M10 90c0-22.1 17.9-40 40-40s40 17.9 40 40"/>
                    </svg>
                    <span style="font-size:0.7rem;color:var(--text-muted);text-align:center;line-height:1.5">Select or Drag and Drop a picture on it.</span>
                  </div>
                </div>
              </div>

              <!-- Zoom slider row -->
              <div style="display:flex;align-items:center;gap:4px;width:100%">
                <button class="btn btn-secondary" style="padding:2px 7px;font-size:0.85rem;flex-shrink:0;line-height:1.4" title="Scale">&#8597;</button>
                <input type="range" id="pm-photo-zoom" min="100" max="250" value="100" step="5"
                       style="flex:1;height:4px;cursor:pointer;accent-color:#1976d2"
                       oninput="scaleParentPhoto(this.value)">
                <button class="btn btn-secondary" style="padding:2px 7px;font-size:0.85rem;flex-shrink:0;line-height:1.4" title="Fit">&#10010;</button>
              </div>

              <!-- Action buttons -->
              <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">
                <button class="btn btn-secondary" style="padding:3px 7px;font-size:0.78rem" title="Rotate left" onclick="rotateParentPhoto(-90)">&#8634;</button>
                <button class="btn btn-secondary" style="padding:3px 7px;font-size:0.78rem" title="Rotate right" onclick="rotateParentPhoto(90)">&#8635;</button>
                <button class="btn btn-secondary" style="padding:3px 7px;font-size:0.78rem" onclick="document.getElementById('pm-photo-input').click()">Select</button>
                <button class="btn btn-secondary" id="pm-photo-remove" style="padding:3px 7px;font-size:0.78rem;display:none" onclick="removeParentPhoto()">Clear</button>
              </div>

              <input type="file" id="pm-photo-input" accept="image/*" style="display:none" onchange="previewParentPhoto(this)">
            </div>

            <!-- RIGHT: Fields -->
            <div style="flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:7px;min-width:0">

              <!-- Row 1: Fr# + Gender -->
              <div style="display:flex;gap:8px;align-items:flex-end">
                <div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0">
                  <label style="font-size:0.74rem;font-weight:600;color:var(--text-muted);padding-left:2px">Fr#</label>
                  <input type="text" id="pm-fr-display" readonly
                         style="width:66px;text-align:center;background:var(--surface2);color:var(--accent);font-weight:700;font-family:monospace;font-size:0.95rem;border:1px solid var(--border);border-radius:6px;padding:7px 4px">
                </div>
                <div style="flex:1;display:flex;flex-direction:column;gap:3px">
                  <label style="font-size:0.74rem;font-weight:600;color:var(--text-muted);padding-left:2px">Gender</label>
                  <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;background:var(--surface)">
                    <span style="padding:0 9px;background:var(--surface2);border-right:1px solid var(--border);align-self:stretch;display:flex;align-items:center;color:var(--text-muted);font-size:0.9rem;border-radius:6px 0 0 6px">&#9873;</span>
                    <select id="pm-gender" style="flex:1;border:none;background:transparent;padding:7px 8px;color:inherit;font-size:0.87rem;outline:none;border-radius:0 6px 6px 0">
                      <option value="">Select a Gender</option>
                      <option value="male">Male</option>
                      <option value="female">Female</option>
                      <option value="other">Other</option>
                    </select>
                  </div>
                </div>
              </div>

              <!-- Name -->
              <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface)">
                <span style="width:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-right:1px solid var(--border);align-self:stretch;color:var(--text-muted)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <input type="text" id="pm-name" placeholder="Name" style="flex:1;border:none;background:transparent;padding:7px 9px;font-size:0.87rem;color:inherit;outline:none">
              </div>

              <!-- NIC (add mode) -->
              <div id="pm-cnic-group">
                <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface)">
                  <span style="width:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-right:1px solid var(--border);align-self:stretch;color:var(--text-muted)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                  </span>
                  <input type="text" id="pm-cnic" placeholder="NIC Number" style="flex:1;border:none;background:transparent;padding:7px 9px;font-size:0.87rem;color:inherit;outline:none" oninput="autofillParentFromCnic()">
                </div>
                <div id="pm-cnic-hint" style="display:none;margin-top:3px;font-size:0.74rem;color:var(--accent);padding-left:2px"></div>
              </div>

              <!-- NIC readonly (edit mode) -->
              <div id="pm-cnic-readonly-group" style="display:none">
                <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface2)">
                  <span style="width:34px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);align-self:stretch;color:var(--text-muted)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                  </span>
                  <div id="pm-cnic-display" style="flex:1;padding:7px 9px;font-size:0.87rem;color:var(--accent);font-weight:600;font-family:monospace"></div>
                </div>
              </div>

              <!-- Phone -->
              <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface)">
                <span style="width:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-right:1px solid var(--border);align-self:stretch;color:var(--text-muted)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </span>
                <input type="text" id="pm-phone" placeholder="Phone" style="flex:1;border:none;background:transparent;padding:7px 9px;font-size:0.87rem;color:inherit;outline:none">
              </div>

              <!-- Profession -->
              <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface)">
                <span style="width:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-right:1px solid var(--border);align-self:stretch;color:var(--text-muted)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
                </span>
                <input type="text" id="pm-profession" placeholder="Profession" style="flex:1;border:none;background:transparent;padding:7px 9px;font-size:0.87rem;color:inherit;outline:none">
              </div>

              <!-- Email + WhatsApp row -->
              <div style="display:flex;gap:7px">
                <div style="flex:3;display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface);min-width:0">
                  <span style="padding:7px 9px;font-size:0.8rem;color:var(--text-muted);background:var(--surface2);border-right:1px solid var(--border);white-space:nowrap;align-self:stretch;display:flex;align-items:center;font-weight:500">Email</span>
                  <input type="email" id="pm-email" placeholder="example@email.com" style="flex:1;border:none;background:transparent;padding:7px 8px;font-size:0.87rem;color:inherit;outline:none;min-width:0">
                </div>
                <div style="flex:2;display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface);min-width:0">
                  <input type="text" id="pm-whatsapp" placeholder="WhatsApp" style="flex:1;border:none;background:transparent;padding:7px 9px;font-size:0.87rem;color:inherit;outline:none;min-width:0">
                </div>
              </div>

              <!-- Address -->
              <div style="display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface)">
                <span style="width:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-right:1px solid var(--border);align-self:stretch;color:var(--text-muted)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
                </span>
                <input type="text" id="pm-address" placeholder="Address" style="flex:1;border:none;background:transparent;padding:7px 9px;font-size:0.87rem;color:inherit;outline:none">
              </div>

            </div>
          </div>
          <!-- ── end two-column ── -->

          <!-- Info divider -->
          <div style="display:flex;align-items:center;gap:8px;padding:8px 14px 4px">
            <div style="flex:1;height:1px;background:var(--border)"></div>
            <span style="color:var(--text-muted);font-size:0.88rem;line-height:1">&#9432;</span>
            <div style="flex:1;height:1px;background:var(--border)"></div>
          </div>

          <!-- Notes -->
          <div style="padding:4px 14px 10px">
            <textarea id="pm-notes" placeholder="Detailed Notes For Any Details" style="width:100%;min-height:82px;resize:vertical;box-sizing:border-box;font-size:0.87rem;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 10px;font-family:inherit;outline:none"></textarea>
          </div>

          <!-- Document uploads -->
          <div style="padding:0 14px 12px;display:flex;gap:12px">
            <!-- Doc 1 -->
            <div style="flex:1;display:flex;flex-direction:column;gap:5px">
              <div style="font-size:0.8rem;font-weight:600;color:var(--text-muted)">PDF Document 1</div>
              <div id="pm-doc1-frame"
                   style="height:90px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);position:relative;overflow:hidden;cursor:pointer"
                   onclick="document.getElementById('pm-doc1-input').click()"
                   ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
                   ondragleave="this.style.borderColor='var(--border)'"
                   ondrop="parentDocDrop(event,1)">
                <div id="pm-doc1-placeholder" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;pointer-events:none">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                  <span style="font-size:0.68rem;color:var(--text-muted);text-align:center;line-height:1.4;padding:0 6px">Select or Drag and Drop a Document on it</span>
                </div>
                <div id="pm-doc1-img-wrap" style="display:none;position:absolute;inset:0;overflow:hidden">
                  <img id="pm-doc1-img" src="" style="width:100%;height:100%;object-fit:contain">
                </div>
                <div id="pm-doc1-pdf-wrap" style="display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
                  <span id="pm-doc1-pdf-name" style="font-size:0.68rem;color:var(--text-muted);text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                </div>
              </div>
              <div style="display:flex;gap:5px">
                <button class="btn btn-secondary" style="flex:1;font-size:0.78rem;padding:4px 0" onclick="document.getElementById('pm-doc1-input').click()">Upload</button>
                <button class="btn" id="pm-doc1-remove" style="flex:1;font-size:0.78rem;padding:4px 0;color:var(--danger);border-color:var(--danger);background:transparent;display:none" onclick="removeParentDoc(1)">Clear</button>
              </div>
              <input type="file" id="pm-doc1-input" accept="image/*,.pdf" style="display:none" onchange="previewParentDoc(this,1)">
            </div>
            <!-- Doc 2 -->
            <div style="flex:1;display:flex;flex-direction:column;gap:5px">
              <div style="font-size:0.8rem;font-weight:600;color:var(--text-muted)">PDF Document 2</div>
              <div id="pm-doc2-frame"
                   style="height:90px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);position:relative;overflow:hidden;cursor:pointer"
                   onclick="document.getElementById('pm-doc2-input').click()"
                   ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
                   ondragleave="this.style.borderColor='var(--border)'"
                   ondrop="parentDocDrop(event,2)">
                <div id="pm-doc2-placeholder" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;pointer-events:none">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                  <span style="font-size:0.68rem;color:var(--text-muted);text-align:center;line-height:1.4;padding:0 6px">Select or Drag and Drop a Document on it</span>
                </div>
                <div id="pm-doc2-img-wrap" style="display:none;position:absolute;inset:0;overflow:hidden">
                  <img id="pm-doc2-img" src="" style="width:100%;height:100%;object-fit:contain">
                </div>
                <div id="pm-doc2-pdf-wrap" style="display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
                  <span id="pm-doc2-pdf-name" style="font-size:0.68rem;color:var(--text-muted);text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                </div>
              </div>
              <div style="display:flex;gap:5px">
                <button class="btn btn-secondary" style="flex:1;font-size:0.78rem;padding:4px 0" onclick="document.getElementById('pm-doc2-input').click()">Upload</button>
                <button class="btn" id="pm-doc2-remove" style="flex:1;font-size:0.78rem;padding:4px 0;color:var(--danger);border-color:var(--danger);background:transparent;display:none" onclick="removeParentDoc(2)">Clear</button>
              </div>
              <input type="file" id="pm-doc2-input" accept="image/*,.pdf" style="display:none" onchange="previewParentDoc(this,2)">
            </div>
          </div>

          <div id="pm-error" style="display:none;color:var(--danger);font-size:0.85rem;background:rgba(231,76,60,.1);padding:8px 14px;margin:0 14px 12px;border-radius:6px"></div>
        </div>

        <div class="modal-footer" style="flex-shrink:0">
          <button class="btn btn-secondary" onclick="closeModal('parent-modal-overlay')">Close Windows</button>
          <button class="btn btn-primary" id="pm-save-btn" onclick="saveParent()">Add Parent</button>
        </div>
      </div>
    </div>
