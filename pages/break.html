
      <div class="page-header">
        <div>
          <div class="page-title">Class Breaks</div>
          <div class="page-subtitle">View break schedule for all classes</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div style="position:relative;display:inline-block">
            <button class="btn btn-pdf btn-sm page-action-btn" onclick="openDownloadMenu('brk-dm', this)">📄 Download PDF</button>
            <div id="brk-dm" class="download-menu">
              <div class="dm-scale-row">
                <span class="dm-scale-label">Page Scale</span>
                <div class="dm-scale-btns">
                  <button type="button" class="dm-scale-btn" data-scale="70" onclick="setMenuScale(event,this)">70%</button>
                  <button type="button" class="dm-scale-btn" data-scale="80" onclick="setMenuScale(event,this)">80%</button>
                  <button type="button" class="dm-scale-btn dm-scale-active" data-scale="90" onclick="setMenuScale(event,this)">90%</button>
                  <button type="button" class="dm-scale-btn" data-scale="100" onclick="setMenuScale(event,this)">100%</button>
                </div>
              </div>
              <div class="download-divider"></div>
              <div class="download-opt" onclick="downloadBreakDoc('pdf','A4','portrait',getMenuScale(this.closest('.download-menu')))">📄 PDF — A4 Portrait</div>
              <div class="download-opt" onclick="downloadBreakDoc('pdf','A4','landscape',getMenuScale(this.closest('.download-menu')))">📄 PDF — A4 Landscape</div>
              <div class="download-divider"></div>
            </div>
          </div>
          <button class="btn btn-excel btn-sm page-action-btn" onclick="downloadGenericExcel('break-body',['Class','Days','Time','Duration'],'Class_Breaks','IDL_Breaks')">📊 Download Excel</button>
          <button class="btn btn-primary admin-or-supervisor page-action-btn" onclick="openBreakModal()">+ Add Break</button>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <select id="brk-class-filter" onchange="loadBreak()" class="filter-select" style="flex:1;min-width:160px;padding:10px 14px">
            <option value="">All Classes</option>
          </select>
          <input type="text" id="brk-search" class="filter-select" placeholder="Search class name..." oninput="loadBreak()" style="flex:1;min-width:160px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);outline:none">
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="filter-label" style="margin-bottom:0">Days:</span>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Monday"    class="brk-day-cb" onchange="loadBreak()" checked style="accent-color:var(--accent)"> Mon</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Tuesday"   class="brk-day-cb" onchange="loadBreak()" checked style="accent-color:var(--accent)"> Tue</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Wednesday" class="brk-day-cb" onchange="loadBreak()" checked style="accent-color:var(--accent)"> Wed</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Thursday"  class="brk-day-cb" onchange="loadBreak()" checked style="accent-color:var(--accent)"> Thu</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:0.88rem;cursor:pointer"><input type="checkbox" value="Friday"    class="brk-day-cb" onchange="loadBreak()" checked style="accent-color:var(--accent)"> Fri</label>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px">
            <label class="show-label">Show:</label>
            <select id="brk-per-page" onchange="loadBreak()" class="filter-select" style="width:auto;padding:5px 10px">
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="0">All</option>
            </select>
            <span style="font-size:0.82rem;color:var(--text-muted)">records</span>
          </div>
          <span id="brk-count-label" style="font-size:0.82rem;color:var(--text-muted)"></span>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap"><table>
          <thead><tr>
            <th>Class</th>
            <th>Days</th>
            <th>Time</th>
            <th>Duration</th>
            <th class="admin-or-supervisor">Actions</th>
          </tr></thead>
          <tbody id="break-body">
            <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
          </tbody>
        </table></div>
      </div>
