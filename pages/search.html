
      <div class="page-header">
        <div>
          <div class="page-title">Teacher Schedule</div>
          <div class="page-subtitle">View teacher schedules and availability</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center" id="search-pdf-btn">
          <div style="position:relative;display:inline-block">
            <button class="btn btn-pdf btn-sm" onclick="openDownloadMenu('search-top-dm', this)">📄 Download PDF</button>
            <div id="search-top-dm" class="download-menu">
              <div class="dm-scale-row">
                <span class="dm-scale-label">Page Scale</span>
                <div class="dm-scale-btns">
                  <button type="button" class="dm-scale-btn" data-scale="70" onclick="setMenuScale(event,this)">70%</button>
                  <button type="button" class="dm-scale-btn" data-scale="80" onclick="setMenuScale(event,this)">80%</button>
                  <button type="button" class="dm-scale-btn dm-scale-active" data-scale="90" onclick="setMenuScale(event,this)">90%</button>
                  <button type="button" class="dm-scale-btn" data-scale="100" onclick="setMenuScale(event,this)">100%</button>
                </div>
              </div>
              <div class="download-divider"></div>
              <div class="download-opt" onclick="downloadSearchDoc('pdf','A4','portrait',getMenuScale(this.closest('.download-menu')))">📄 PDF — A4 Portrait</div>
              <div class="download-opt" onclick="downloadSearchDoc('pdf','A4','landscape',getMenuScale(this.closest('.download-menu')))">📄 PDF — A4 Landscape</div>
              <div class="download-divider"></div>
            </div>
          </div>
          <button class="btn btn-excel btn-sm" onclick="downloadSearchExcel()">📊 Download Excel</button>
        </div>
      </div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">Search Teacher Schedule</div>
        <div class="search-bar" style="margin-bottom:14px">
          <select id="search-teacher" class="filter-select" style="flex:1;padding:11px 14px">
            <option value="">Select a teacher...</option>
          </select>
          <button class="btn btn-primary" onclick="searchTeacher()">Search</button>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-top:8px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <label class="filter-label" style="margin-bottom:0">Days</label>
            <label style="display:flex;align-items:center;gap:5px;font-size:0.88rem;cursor:pointer"><input type="checkbox" class="search-day-cb" value="Monday" checked style="accent-color:var(--accent)"> Mon</label>
            <label style="display:flex;align-items:center;gap:5px;font-size:0.88rem;cursor:pointer"><input type="checkbox" class="search-day-cb" value="Tuesday" checked style="accent-color:var(--accent)"> Tue</label>
            <label style="display:flex;align-items:center;gap:5px;font-size:0.88rem;cursor:pointer"><input type="checkbox" class="search-day-cb" value="Wednesday" checked style="accent-color:var(--accent)"> Wed</label>
            <label style="display:flex;align-items:center;gap:5px;font-size:0.88rem;cursor:pointer"><input type="checkbox" class="search-day-cb" value="Thursday" checked style="accent-color:var(--accent)"> Thu</label>
            <label style="display:flex;align-items:center;gap:5px;font-size:0.88rem;cursor:pointer"><input type="checkbox" class="search-day-cb" value="Friday" checked style="accent-color:var(--accent)"> Fri</label>
          </div>
        </div>
      </div>
      <div id="search-results"></div>
