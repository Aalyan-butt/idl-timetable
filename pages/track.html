
      <div class="page-header">
        <div>
          <div class="page-title">Track Teachers</div>
          <div class="page-subtitle">See who's busy and who's free right now</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div style="position:relative;display:inline-block">
            <button class="btn btn-pdf btn-sm page-action-btn" onclick="openDownloadMenu('track-download-menu', this)">Download PDF</button>
            <div id="track-download-menu" class="download-menu">
              <div class="dm-scale-row">
                <span class="dm-scale-label">Page Scale</span>
                <div class="dm-scale-btns">
                  <button type="button" class="dm-scale-btn" data-scale="70" onclick="setMenuScale(event,this)">70%</button>
                  <button type="button" class="dm-scale-btn" data-scale="80" onclick="setMenuScale(event,this)">80%</button>
                  <button type="button" class="dm-scale-btn dm-scale-active" data-scale="90" onclick="setMenuScale(event,this)">90%</button>
                  <button type="button" class="dm-scale-btn" data-scale="100" onclick="setMenuScale(event,this)">100%</button>
                </div>
              </div>
              <div class="download-divider"></div>
              <div class="download-opt" onclick="downloadTrackDoc('pdf','A4','portrait',getMenuScale(this.closest('.download-menu')))">PDF — A4 Portrait</div>
              <div class="download-opt" onclick="downloadTrackDoc('pdf','A4','landscape',getMenuScale(this.closest('.download-menu')))">PDF — A4 Landscape</div>
              <div class="download-divider"></div>
            </div>
          </div>
          <button class="btn btn-excel btn-sm page-action-btn" onclick="downloadTrackExcel()">Download Excel</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-start;width:100%">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span style="font-size:0.8rem;color:var(--text-muted)">Days:</span>
            <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;cursor:pointer"><input type="checkbox" value="Monday" class="track-day-cb" onchange="loadTrack()" style="accent-color:var(--accent)"> Mon</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;cursor:pointer"><input type="checkbox" value="Tuesday" class="track-day-cb" onchange="loadTrack()" style="accent-color:var(--accent)"> Tue</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;cursor:pointer"><input type="checkbox" value="Wednesday" class="track-day-cb" onchange="loadTrack()" style="accent-color:var(--accent)"> Wed</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;cursor:pointer"><input type="checkbox" value="Thursday" class="track-day-cb" onchange="loadTrack()" style="accent-color:var(--accent)"> Thu</label>
            <label style="display:flex;align-items:center;gap:4px;font-size:0.82rem;cursor:pointer"><input type="checkbox" value="Friday" class="track-day-cb" onchange="loadTrack()" style="accent-color:var(--accent)"> Fri</label>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span style="font-size:0.8rem;color:var(--text-muted)">Time range:</span>
            <input type="time" id="track-time-from" onchange="loadTrack()" value="08:00" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:inherit">
            <span style="font-size:0.8rem;color:var(--text-muted)">to</span>
            <input type="time" id="track-time-to" onchange="loadTrack()" value="14:00" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:inherit">
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%">
            <span style="font-size:0.8rem;color:var(--text-muted)">Teacher:</span>
            <select id="track-teacher-filter" onchange="loadTrack()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:inherit;min-width:200px;flex:1;outline:none">
              <option value="">All Teachers</option>
            </select>
          </div>
        </div>
      </div>
      <div id="track-container"></div>
