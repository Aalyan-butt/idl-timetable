
<style>
/* ── Class Enrollment — premium redesign ─────────────────────────── */
.ce-stat-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 18px;
  background: linear-gradient(150deg, #0d0d1f 0%, #09091a 100%);
  border: 1px solid rgba(201,168,76,0.22);
  border-radius: 10px;
  min-width: 130px;
}
.ce-stat-chip-icon { font-size: 1.1rem; }
.ce-stat-chip-label {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--accent);
  margin-bottom: 2px;
}
.ce-stat-chip-val { font-size: 1.05rem; font-weight: 700; color: var(--text); }

/* Filter bar */
.ce-filter-card {
  background: linear-gradient(150deg, #0d0d1f 0%, #09091a 100%);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 14px;
  position: relative;
}
.ce-filter-card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.4),transparent);
  border-radius:10px 10px 0 0;pointer-events:none;
}

/* Tab pills */
.ce-tab-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid rgba(201,168,76,0.25);
  background: transparent;
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.ce-tab-pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(201,168,76,0.07); }
.ce-tab-pill.active { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #05050e; border-color: transparent; }
.ce-tab-pill .ce-pill-count {
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 0.72rem;
  font-weight: 700;
}
.ce-tab-pill.active .ce-pill-count { background: rgba(0,0,0,0.18); }

/* Search & filter inputs */
.ce-search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.ce-search-wrap .ce-search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.9rem;
  pointer-events: none;
}
.ce-search-wrap input {
  width: 100%;
  padding: 8px 34px 8px 32px;
  border-radius: 8px;
  border: 1px solid rgba(201,168,76,0.22);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 0.88rem;
  outline: none;
  box-sizing: border-box;
  transition: border-color .2s;
}
.ce-search-wrap input:focus { border-color: var(--accent); }
.ce-search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1rem;
  padding: 0 2px;
  display: none;
}
.ce-filter-select {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(201,168,76,0.22);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
}
.ce-filter-select:focus { border-color: var(--accent); }

/* Table */
#ce-table { width: 100%; border-collapse: collapse; }
#ce-table thead tr { background: rgba(201,168,76,0.05); }
#ce-table thead th {
  font-family: 'Cinzel', serif;
  padding: 13px 14px;
  font-size: 0.82rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent);
  border-bottom: 2px solid rgba(201,168,76,0.25);
  white-space: nowrap;
}
#ce-table tbody tr {
  border-bottom: 1px solid rgba(201,168,76,0.07);
  transition: background .12s;
}
#ce-table tbody tr:hover { background: rgba(201,168,76,0.04); }
#ce-table td {
  padding: 11px 14px;
  font-size: 0.9rem;
  color: var(--text);
  vertical-align: middle;
}

/* Row save-state indicators */
#ce-table tbody tr.ce-row-dirty {
  background: rgba(201,168,76,0.06) !important;
  border-left: 3px solid var(--accent);
}
#ce-table tbody tr.ce-row-saved {
  background: rgba(68,204,136,0.06) !important;
  border-left: 3px solid #44cc88;
}
#ce-table tbody tr.ce-row-error {
  background: rgba(255,80,80,0.06) !important;
  border-left: 3px solid #ff5050;
}

/* Class trigger button */
.ce-trigger {
  flex: 1;
  max-width: 210px;
  padding: 7px 11px;
  border-radius: 8px;
  border: 1px solid rgba(201,168,76,0.25);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  user-select: none;
  transition: border-color .15s, background .15s;
}
.ce-trigger:hover { border-color: var(--accent); background: rgba(201,168,76,0.08); }
.ce-trigger-label {
  font-size: 0.85rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.ce-trigger-arrow { font-size: 0.65rem; color: var(--text-muted); flex-shrink: 0; }

/* Save button states */
.ce-save-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 16px;
  border-radius: 8px;
  border: none;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  font-family: inherit;
}
.ce-save-btn.state-default {
  background: rgba(201,168,76,0.12);
  color: var(--accent);
  border: 1px solid rgba(201,168,76,0.3);
}
.ce-save-btn.state-default:hover { background: rgba(201,168,76,0.22); }
.ce-save-btn.state-dirty {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #05050e;
  box-shadow: 0 2px 12px rgba(201,168,76,0.3);
}
.ce-save-btn.state-dirty:hover { box-shadow: 0 4px 18px rgba(201,168,76,0.5); transform: translateY(-1px); }
.ce-save-btn.state-saving {
  background: rgba(201,168,76,0.1);
  color: var(--accent);
  border: 1px solid rgba(201,168,76,0.25);
  cursor: not-allowed;
  opacity: .8;
}
.ce-save-btn.state-saved {
  background: rgba(68,204,136,0.15);
  color: #44cc88;
  border: 1px solid rgba(68,204,136,0.35);
}
.ce-save-btn.state-error {
  background: rgba(255,80,80,0.12);
  color: #ff5050;
  border: 1px solid rgba(255,80,80,0.3);
}

/* Unsaved badge */
.ce-pending-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(201,168,76,0.15);
  color: var(--accent);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 14px;
  padding: 3px 12px;
  font-size: 0.78rem;
  font-weight: 700;
}

/* Float picker redesign */
#ce-float-picker {
  background: linear-gradient(150deg,#0f0f20,#0a0a1a) !important;
  border: 1px solid rgba(201,168,76,0.3) !important;
  border-radius: 10px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important;
}
</style>

      <!-- ── Page Header ─────────────────────────────────────────────── -->
      <div class="page-header">

              <div class="download-opt" onclick="downloadTableDoc('ce-body','class_enrollment',['#','Student Name','GR #','Father Name','Current Class'],'pdf','A4','landscape',getMenuScale(this.closest('.download-menu')))">&#128196; PDF &mdash; A4 Landscape</div>
              <div class="download-divider"></div>
            </div>
          </div>
          <button class="btn btn-excel btn-sm" onclick="downloadGenericExcel('ce-body',['#','Student Name','GR #','Father Name','Current Class','Assign/Update'],'Class Enrollment','IDL_Class_Enrollment')">&#128202; Download Excel</button>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">

          <div>
            <div class="ce-stat-chip-label">Total Students</div>

          </div>

            <div class="ce-stat-chip-label" style="color:#44cc88">Assigned</div>

          </div>

        <div class="ce-stat-chip" style="border-color:rgba(255,160,50,0.3)">

      <!-- ── Filter Card ──────────────────────────────────────────────── -->
